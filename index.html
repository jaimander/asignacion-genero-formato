<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Asignador de proyectos</title>

    <!-- PDF libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Barrio&family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&display=swap");

      body {
        font-family: "Syne", sans-serif;
        padding: 20px;
      }

      table {
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 10px 14px;
        text-align: left;
        min-width: 220px;
      }

      th {
        background-color: #f0f0f0;
      }

      tr.nueva {
        background-color: rgb(140, 158, 255);
        color: white;
        font-size: 40px;
        font-weight: bold;
      }

      button,
      .custom-file {
        font-family: "Syne", sans-serif;
        display: inline-block;
        padding: 10px 16px;
        background: rgb(214, 247, 76);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 10px;
        font-size: 16px;
      }

      button:hover,
      .custom-file:hover {
        background: rgb(180, 235, 2);
      }

      .custom-file input {
        display: none;
      }

      h2 {
        font-family: "Barrio", system-ui;
        font-size: 100px;
        color: rgb(240, 96, 56);
      }

      #contenedor {
        margin-left: 50%;
        transform: translateX(-50%);
      }
    </style>
  </head>

  <body>
    <div id="contenedor">
      <h2>PA' QUE TE NARRES</h2>

      <label class="custom-file">
        Subir CSV
        <input type="file" id="fileInput" accept=".csv" onchange="mostrarNombre(this)" />
      </label>

      <span id="nombreArchivo"></span>

      <button onclick="procesar()">Procesar</button>
      <button onclick="exportarTablaPDF()">Exportar PDF</button>

      <table id="tabla">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Género</th>
            <th>Formato</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      function mostrarNombre(input) {
        const nombre = input.files[0]?.name || "";
        document.getElementById("nombreArchivo").textContent = nombre;
      }

      const formatos = [
        "Video (para YouTube)",
        "Sonido (para Spotify)",
        "Carrusel (para Instagram)",
      ];

      const generos = [
        "Entrevista tipo perfil",
        "Crónica",
        "Chisme",
      ];

      function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function procesar() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) return alert("Sube un archivo CSV");

        const reader = new FileReader();

        reader.onload = function (e) {
          const texto = e.target.result;
          const filas = texto.split("\n");

          let resultado = [];

          filas.forEach((fila, i) => {
            if (i === 0) return;

            let nombre = fila.trim();

            if (nombre !== "") {
              if (nombre.includes(",")) {
                const partes = nombre.split(",");
                nombre =
                  partes.slice(1).join(" ").trim() +
                  " " +
                  partes[0].trim();
              }

              resultado.push({
                nombre,
                genero: randomItem(generos),
                formato: randomItem(formatos),
              });
            }
          });

          mostrarSecuencial(resultado);
        };

        reader.readAsText(file);
      }

      function mostrarSecuencial(data) {
        const tbody = document.querySelector("#tabla tbody");
        tbody.innerHTML = "";

        let i = 0;

        function mostrarFila() {
          if (i >= data.length) return;

          const d = data[i];

          const tr = document.createElement("tr");
          tr.classList.add("nueva");

          const tdNombre = document.createElement("td");
          const tdGenero = document.createElement("td");
          const tdFormato = document.createElement("td");

          tdNombre.textContent = d.nombre;
          tdGenero.textContent = "";
          tdFormato.textContent = "";

          tr.appendChild(tdNombre);
          tr.appendChild(tdGenero);
          tr.appendChild(tdFormato);

          tbody.appendChild(tr);

          tr.scrollIntoView({ behavior: "smooth", block: "end" });

          setTimeout(() => {
            tr.classList.remove("nueva");
          }, 4500);

          setTimeout(() => {
            tdGenero.textContent = d.genero;
          }, 2000);

          setTimeout(() => {
            tdFormato.textContent = d.formato;
          }, 3000);

          i++;
          setTimeout(mostrarFila, 4000);
        }

        mostrarFila();
      }

      // 📄 EXPORTAR PDF LIMPIO
      function exportarTablaPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();

        const filas = [];

        document.querySelectorAll("#tabla tbody tr").forEach(tr => {
          const celdas = tr.querySelectorAll("td");

          filas.push([
            celdas[0]?.textContent || "",
            celdas[1]?.textContent || "",
            celdas[2]?.textContent || ""
          ]);
        });

        pdf.text("Resultado", 14, 15);

        pdf.autoTable({
          head: [["Nombre", "Género", "Formato"]],
          body: filas,
          startY: 20
        });

        pdf.save("tabla.pdf");
      }
    </script>
  </body>
</html>
